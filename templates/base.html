<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}RL Load Balancer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0c0f;
            --surface: #111318;
            --surface2: #181c23;
            --border: #1e2330;
            --border-bright: #2a3347;
            --accent: #00e5ff;
            --accent2: #7c4dff;
            --accent3: #ff6b35;
            --green: #00ff88;
            --red: #ff3b5c;
            --yellow: #ffd600;
            --text: #e8eaf0;
            --text-dim: #6b7590;
            --text-muted: #3d4560;
            --glow: 0 0 20px rgba(0, 229, 255, 0.15);
            --glow-strong: 0 0 40px rgba(0, 229, 255, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scan-line overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Corner grid bg */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 12, 15, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }

        .nav-logo {
            width: 28px;
            height: 28px;
            border: 2px solid var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--accent);
            box-shadow: var(--glow);
        }

        .nav-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.05em;
        }

        .nav-title span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 4px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent);
            border-color: var(--border-bright);
            background: rgba(0, 229, 255, 0.05);
        }

        .main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            margin-bottom: 2.5rem;
        }

        .page-tag {
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-tag::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 1px;
            background: var(--accent);
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 8px;
            max-width: 600px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent2), transparent);
            opacity: 0.4;
        }

        .card-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: #33eaff;
            box-shadow: 0 0 24px rgba(0, 229, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border-bright);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: rgba(255, 59, 92, 0.1);
            color: var(--red);
            border: 1px solid rgba(255, 59, 92, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 59, 92, 0.2);
        }

        .btn-success {
            background: var(--green);
            color: #000;
        }

        .btn-success:hover {
            box-shadow: 0 0 24px rgba(0, 255, 136, 0.4);
            transform: translateY(-1px);
        }

        /* Form inputs */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 9px 12px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }

        .form-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 22px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--border-bright);
            border-radius: 22px;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle input:checked + .toggle-slider {
            background: rgba(0, 229, 255, 0.3);
        }

        .toggle input:checked + .toggle-slider::before {
            transform: translateX(22px);
            background: var(--accent);
        }

        /* Collapsible */
        .collapsible {
            margin-top: 6px;
        }

        .collapsible-trigger {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .collapsible-trigger:hover { color: var(--text-dim); }

        .collapsible-trigger .arrow {
            transition: transform 0.2s;
            font-size: 8px;
        }

        .collapsible-trigger.open .arrow {
            transform: rotate(90deg);
        }

        .collapsible-content {
            display: none;
            font-size: 11px;
            color: var(--text-dim);
            background: var(--bg);
            border-left: 2px solid var(--border);
            padding: 8px 12px;
            margin-top: 6px;
            border-radius: 0 4px 4px 0;
            line-height: 1.6;
        }

        .collapsible-content.open { display: block; }

        /* Grid layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }

        /* Stat blocks */
        .stat-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .stat-value.accent { color: var(--accent); }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-value.yellow { color: var(--yellow); }

        .stat-sub {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Progress bar */
        .progress-bar-wrapper {
            background: var(--border);
            border-radius: 2px;
            height: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 0.4s ease;
            border-radius: 2px;
        }

        /* Status badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .badge-running {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .badge-done {
            background: rgba(0, 255, 136, 0.1);
            color: var(--green);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .badge-idle {
            background: var(--surface2);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .badge-error {
            background: rgba(255, 59, 92, 0.1);
            color: var(--red);
            border: 1px solid rgba(255, 59, 92, 0.3);
        }

        .pulse {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* Chart containers */
        .chart-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
        }

        .chart-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        /* Section separator */
        .section-sep {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }

        /* Alert */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: rgba(255, 59, 92, 0.08);
            border: 1px solid rgba(255, 59, 92, 0.3);
            color: var(--red);
        }

        .alert-info {
            background: rgba(0, 229, 255, 0.06);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: var(--accent);
        }

        .alert-warning {
            background: rgba(255, 214, 0, 0.06);
            border: 1px solid rgba(255, 214, 0, 0.2);
            color: var(--yellow);
        }

        /* Method color indicators */
        .method-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .method-dqn { background: var(--accent); }
        .method-random { background: var(--accent3); }
        .method-rr { background: var(--accent2); }
        .method-lc { background: var(--green); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }

        /* Responsive */
        @media (max-width: 900px) {
            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <a class="nav-brand" href="/">
            <div class="nav-logo">RL</div>
            <span class="nav-title">LOAD<span>BALANCER</span></span>
        </a>
        <div class="nav-links">
            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">Home</a>
            <a class="nav-link {% if request.endpoint == 'train_page' %}active{% endif %}" href="/train">Train</a>
            <a class="nav-link {% if request.endpoint == 'evaluate_page' %}active{% endif %}" href="/evaluate">Evaluate</a>
        </div>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Collapsible descriptions
        document.addEventListener('click', function(e) {
            const trigger = e.target.closest('.collapsible-trigger');
            if (!trigger) return;
            trigger.classList.toggle('open');
            const content = trigger.nextElementSibling;
            if (content && content.classList.contains('collapsible-content')) {
                content.classList.toggle('open');
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
